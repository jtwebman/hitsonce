name = "hitsonce"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Pin deploys to JT's PERSONAL Cloudflare account so they can never land on the
# work (Harman) account. (Account IDs are not secret — safe to commit.)
account_id = "7001118f85b48a64b8239b870e497802"

# Dashboard/API on the app domain (gate it with a Cloudflare Access application over
# hitsonce.app that allows your email). Collector routes on tracked zones are added
# per site and stay PUBLIC, e.g.
#   { pattern = "jtwebman.com/_stats", zone_name = "jtwebman.com" }
routes = [
  { pattern = "hitsonce.app", custom_domain = true },
  # Collector: only /_stats on each tracked zone routes to this Worker; the rest of
  # the site is untouched. Public (never behind Access).
  { pattern = "onyourfeet.app/_stats", zone_name = "onyourfeet.app" },
]

# Storage: Cloudflare D1 (SQLite). Self-host setup is one command:
#   wrangler d1 create hitsonce        # then paste the returned database_id below
#   npm run migrate:local              # apply migrations locally (wrangler dev)
#   npm run migrate                    # apply migrations to the remote D1
[[d1_databases]]
binding = "DB"
database_name = "hitsonce"
database_id = "aeb2183f-1fd0-4597-a801-e5a65c5a2c19"
migrations_dir = "migrations"

[vars]
# Deployed builds are production: requireAccess fails CLOSED (503) until Access is
# configured, so a deploy can't expose the dashboard. `wrangler dev` overrides this
# to "development" via .dev.vars (gitignored) for the local passthrough.
ENVIRONMENT = "production"
# Browser origins allowed by CORS (the dashboard). Override per environment.
WEB_ORIGINS = "http://localhost:5173,https://hitsonce.app"
APP_URL = "https://hitsonce.app"
# Cloudflare Access (Zero Trust) — gates /dashboard + /api. Not secrets (the security
# is in the JWT signature). AUD comes from the Access application.
ACCESS_TEAM_DOMAIN = "jtanna.cloudflareaccess.com"
ACCESS_AUD = "ca44468e54f69509456ca99283719b63a3c2f44a3bcdfbcb85c49377d2a9c943"
