name: Release & deploy

# Publish a GitHub release (or run this manually) to ship: the same CI gate runs,
# then pending D1 migrations are applied and the Worker is deployed to Cloudflare.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      # Apply any new migrations before the deploy so the schema is ready for the new
      # code. Idempotent: wrangler only runs migrations not yet applied.
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply hitsonce --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
