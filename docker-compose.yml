# Local dev database. `docker compose up -d`, then point migrations + wrangler dev
# at it (matches the localConnectionString in wrangler.toml):
#   DATABASE_URL=postgres://postgres:postgres@localhost:5432/hitsonce npm run migrate
#
# Postgres 18 — the latest version Neon supports / defaults to, so local matches prod.
services:
  postgres:
    image: postgres:18
    container_name: hitsonce-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hitsonce
    ports:
      - '5432:5432'
    volumes:
      # Postgres 18's official image expects the mount at /var/lib/postgresql.
      - hitsonce-pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hitsonce-pgdata:
